<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>yt-grab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --surface: #111; --border: #222;
      --accent: #e8ff47; --red: #ff4747; --text: #f0f0f0;
      --muted: #666; --r: 4px;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Space Mono', monospace;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem; overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 100;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.012) 2px, rgba(255,255,255,0.012) 4px);
    }
    .corner { position: fixed; width: 60px; height: 60px; border-color: var(--accent); border-style: solid; opacity: 0.25; }
    .corner-tl { top:20px; left:20px; border-width:2px 0 0 2px; }
    .corner-tr { top:20px; right:20px; border-width:2px 2px 0 0; }
    .corner-bl { bottom:20px; left:20px; border-width:0 0 2px 2px; }
    .corner-br { bottom:20px; right:20px; border-width:0 2px 2px 0; }

    .container { width:100%; max-width:660px; animation: up .5s ease both; }
    @keyframes up { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }

    header { margin-bottom: 2.5rem; }
    .logo { font-family:'Syne',sans-serif; font-size:clamp(2.8rem,10vw,4.5rem); font-weight:800; line-height:.9; letter-spacing:-.03em; color:var(--accent); text-shadow:4px 4px 0 #2a3000; }
    .logo span { color:var(--text); }
    .tagline { margin-top:.6rem; color:var(--muted); font-size:.7rem; letter-spacing:.12em; text-transform:uppercase; }

    .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:1.75rem; position:relative; }
    .card::before { content:''; position:absolute; top:-1px;left:-1px;right:-1px; height:2px; background:linear-gradient(90deg,var(--accent),transparent); border-radius:var(--r) var(--r) 0 0; }

    .lbl { font-size:.62rem; letter-spacing:.15em; text-transform:uppercase; color:var(--muted); margin-bottom:.4rem; }

    .row { display:flex; gap:.6rem; margin-bottom:1.25rem; }
    input { flex:1; background:var(--bg); border:1px solid var(--border); border-radius:var(--r); color:var(--text); font-family:'Space Mono',monospace; font-size:.8rem; padding:.7rem .9rem; outline:none; transition:border-color .2s; }
    input:focus { border-color:var(--accent); }
    input::placeholder { color:#2a2a2a; }

    .btn { background:var(--accent); border:none; border-radius:var(--r); color:#000; cursor:pointer; font-family:'Syne',sans-serif; font-size:.85rem; font-weight:800; letter-spacing:.04em; padding:.7rem 1.4rem; transition:transform .1s,box-shadow .1s; white-space:nowrap; }
    .btn:hover { transform:translateY(-1px); box-shadow:0 4px 14px rgba(232,255,71,.3); }
    .btn:active { transform:none; }
    .btn:disabled { opacity:.35; cursor:not-allowed; transform:none; box-shadow:none; }

    .notice { background:#161200; border:1px solid #302800; border-radius:var(--r); padding:.65rem .9rem; margin-bottom:1.25rem; font-size:.67rem; color:#776600; line-height:1.6; }
    .notice strong { color:var(--accent); }

    /* Status log */
    #log { display:none; margin-top:1.25rem; border-top:1px solid var(--border); padding-top:1rem; }
    .log-line { display:flex; gap:.5rem; align-items:flex-start; margin-bottom:.3rem; font-size:.72rem; animation:li .2s ease both; }
    @keyframes li { from{opacity:0;transform:translateX(-4px)} to{opacity:1;transform:none} }
    .dot { width:6px; height:6px; border-radius:50%; margin-top:.3rem; flex-shrink:0; }
    .d-spin { background:var(--accent); animation:blink 1s infinite; }
    .d-ok   { background:#4ade80; }
    .d-err  { background:var(--red); }
    .d-info { background:#60a5fa; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
    .log-text { line-height:1.5; color:var(--muted); }
    .log-text.hi { color:var(--text); }

    /* Video info */
    #vinfo { display:none; margin-top:1rem; background:var(--bg); border:1px solid var(--border); border-radius:var(--r); padding:.9rem; flex-direction:row; gap:.9rem; align-items:center; }
    #vinfo img { width:100px; height:56px; object-fit:cover; border-radius:2px; flex-shrink:0; background:#1a1a1a; }
    .vi-title { font-family:'Syne',sans-serif; font-size:.85rem; font-weight:700; line-height:1.3; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
    .vi-sub { font-size:.63rem; color:var(--muted); margin-top:.25rem; }

    /* Format list */
    #fmts { display:none; margin-top:1.25rem; border-top:1px solid var(--border); padding-top:1rem; }
    .fmts-lbl { font-size:.62rem; letter-spacing:.15em; text-transform:uppercase; color:var(--muted); margin-bottom:.6rem; }

    .fmt-group-title { font-size:.6rem; letter-spacing:.1em; text-transform:uppercase; color:#444; margin:.75rem 0 .4rem; }
    .fmt-group-title:first-child { margin-top:0; }

    .fmt { display:flex; align-items:center; justify-content:space-between; gap:.6rem; background:var(--bg); border:1px solid var(--border); border-radius:var(--r); padding:.55rem .9rem; text-decoration:none; color:var(--text); transition:border-color .15s,background .15s; cursor:pointer; margin-bottom:.3rem; }
    .fmt:hover { border-color:var(--accent); background:#141400; }
    .fmt-left { display:flex; align-items:center; gap:.6rem; }
    .fmt-badge { font-size:.63rem; font-family:'Syne',sans-serif; font-weight:800; background:#1a1a1a; border:1px solid #2a2a2a; border-radius:2px; padding:.12rem .35rem; color:var(--accent); min-width:44px; text-align:center; white-space:nowrap; }
    .fmt-codec { font-size:.68rem; color:var(--muted); }
    .fmt-size { font-size:.63rem; color:#444; }
    .fmt-arrow { font-size:.8rem; color:var(--accent); font-family:'Syne',sans-serif; font-weight:800; }

    footer { margin-top:2rem; font-size:.62rem; color:var(--muted); text-align:center; line-height:1.9; }
    footer a { color:#3a3a3a; text-decoration:none; }
    footer a:hover { color:var(--accent); }
  </style>
</head>
<body>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="container">
    <header>
      <div class="logo">yt<span>-</span>grab</div>
      <div class="tagline">YouTube video downloader · powered by YTStream</div>
    </header>

    <div class="card">
      <div class="notice">
        <strong>⚠</strong> Only download content you have rights to — Creative Commons, public domain, or your own videos.
      </div>

      <div class="lbl">YouTube URL</div>
      <div class="row">
        <input type="text" id="url" placeholder="https://www.youtube.com/watch?v=..." />
        <button class="btn" id="go" onclick="go()">GO</button>
      </div>

      <div id="log"></div>
      <div id="vinfo">
        <img id="vthumb" src="" alt="" />
        <div>
          <div class="vi-title" id="vtitle"></div>
          <div class="vi-sub" id="vsub"></div>
        </div>
      </div>
      <div id="fmts">
        <div class="fmts-lbl">Pick a format to download</div>
        <div id="fmts-list"></div>
      </div>
    </div>

    <footer>
      powered by <a href="https://rapidapi.com/ytjar/api/ytstream-download-youtube-videos" target="_blank">YTStream</a> via RapidAPI ·
      no tracking · no storage<br/>
      only download content you have rights to
    </footer>
  </div>

  <script>
    const KEY  = '84ff588c9bmsh25a213355c21977p1c6997jsnf9a1fe621e32';
    const HOST = 'ytstream-download-youtube-videos.p.rapidapi.com';

    const logEl   = document.getElementById('log');
    const vinfoEl = document.getElementById('vinfo');
    const fmtsEl  = document.getElementById('fmts');
    const fmtList = document.getElementById('fmts-list');
    const goBtn   = document.getElementById('go');

    function addLog(msg, type='info') {
      logEl.style.display = 'block';
      const dc = {spin:'d-spin',ok:'d-ok',err:'d-err',info:'d-info'}[type]||'d-info';
      const hi = (type==='spin'||type==='ok') ? 'hi' : '';
      const el = document.createElement('div');
      el.className = 'log-line';
      el.innerHTML = `<div class="dot ${dc}"></div><div class="log-text ${hi}">${msg}</div>`;
      logEl.appendChild(el);
      return el;
    }

    function reset() {
      logEl.innerHTML=''; logEl.style.display='none';
      vinfoEl.style.display='none';
      fmtsEl.style.display='none';
      fmtList.innerHTML='';
    }

    function extractId(url) {
      const m = url.match(/(?:v=|\/embed\/|\/shorts\/|youtu\.be\/)([A-Za-z0-9_-]{11})/);
      return m ? m[1] : null;
    }

    function humanSize(bytes) {
      if (!bytes) return '';
      const mb = parseInt(bytes) / 1024 / 1024;
      return mb > 1 ? `${mb.toFixed(1)} MB` : `${(parseInt(bytes)/1024).toFixed(0)} KB`;
    }

    function fmtTime(s) {
      if (!s) return '';
      const m = Math.floor(s/60), sec = s%60;
      return `${m}:${String(sec).padStart(2,'0')}`;
    }

    function codecLabel(mimeType='') {
      if (mimeType.includes('avc1') || mimeType.includes('avc')) return 'H.264';
      if (mimeType.includes('vp9'))  return 'VP9';
      if (mimeType.includes('av01') || mimeType.includes('av1')) return 'AV1';
      if (mimeType.includes('mp4a')) return 'AAC';
      if (mimeType.includes('opus')) return 'Opus';
      return mimeType.split(';')[0].split('/')[1] || '?';
    }

    function containerLabel(mimeType='') {
      if (mimeType.includes('webm')) return 'webm';
      if (mimeType.includes('mp4'))  return 'mp4';
      return '';
    }

    async function go() {
      const raw = document.getElementById('url').value.trim();
      if (!raw) { document.getElementById('url').focus(); return; }

      const id = extractId(raw);
      if (!id) { reset(); addLog('Could not find a YouTube video ID in that URL.', 'err'); return; }

      reset();
      goBtn.disabled = true;
      const sl = addLog('Fetching video info from YTStream…', 'spin');

      try {
        const res = await fetch(`https://${HOST}/dl?id=${id}`, {
          headers: { 'x-rapidapi-key': KEY, 'x-rapidapi-host': HOST }
        });

        if (res.status === 429) throw new Error('Rate limit hit — try again in a minute.');
        if (res.status === 403) throw new Error('API key error or subscription issue.');
        if (!res.ok) throw new Error(`API error ${res.status}`);

        const d = await res.json();
        if (d.status && d.status !== 'OK') throw new Error(`API returned: ${d.status}`);

        sl.querySelector('.dot').className = 'dot d-ok';
        sl.querySelector('.log-text').textContent = `Got ${d.title || 'video'} — parsing formats…`;
        sl.querySelector('.log-text').classList.add('hi');

        // Show video info
        if (d.title) {
          document.getElementById('vtitle').textContent = d.title;
          document.getElementById('vsub').textContent =
            [d.channelTitle, fmtTime(parseInt(d.lengthSeconds))].filter(Boolean).join(' · ');
          // Best thumbnail
          const thumbs = d.thumbnail;
          const thumbUrl = Array.isArray(thumbs)
            ? thumbs[thumbs.length-1]?.url
            : (thumbs?.[Object.keys(thumbs).sort((a,b)=>b-a)[0]]?.url
               || `https://img.youtube.com/vi/${id}/hqdefault.jpg`);
          document.getElementById('vthumb').src = thumbUrl || `https://img.youtube.com/vi/${id}/hqdefault.jpg`;
          vinfoEl.style.display = 'flex';
        }

        // The API returns formats and adaptiveFormats as objects keyed by index
        // Convert to arrays
        const toArr = obj => obj ? (Array.isArray(obj) ? obj : Object.values(obj)) : [];
        const formats         = toArr(d.formats);
        const adaptiveFormats = toArr(d.adaptiveFormats);

        // Video formats: those with both video + audio (formats array, itag 18 etc)
        // Adaptive: video-only or audio-only streams
        const combined = formats.filter(f => f.url && f.mimeType?.includes('video'));
        const videoOnly = adaptiveFormats.filter(f => f.url && f.mimeType?.includes('video'));
        const audioOnly = adaptiveFormats.filter(f => f.url && f.mimeType?.includes('audio'));

        // Sort by height descending
        const byHeight = arr => [...arr].sort((a,b) => (parseInt(b.height)||0)-(parseInt(a.height)||0));
        const byBitrate = arr => [...arr].sort((a,b) => (parseInt(b.averageBitrate||b.bitrate)||0)-(parseInt(a.averageBitrate||a.bitrate)||0));

        // Deduplicate by qualityLabel + codec
        function dedup(arr) {
          const seen = new Set();
          return arr.filter(f => {
            const key = `${f.qualityLabel}-${codecLabel(f.mimeType)}`;
            if (seen.has(key)) return false;
            seen.add(key); return true;
          });
        }

        const rows = [
          { group: '📹 Video + Audio (ready to download)', items: dedup(byHeight(combined)) },
          { group: '🎞 Video only (no audio)', items: dedup(byHeight(videoOnly)) },
          { group: '🎵 Audio only', items: dedup(byBitrate(audioOnly)) },
        ].filter(g => g.items.length > 0);

        if (!rows.length) throw new Error('No downloadable formats found.');

        rows.forEach(({ group, items }) => {
          const gt = document.createElement('div');
          gt.className = 'fmt-group-title';
          gt.textContent = group;
          fmtList.appendChild(gt);

          items.forEach(f => {
            const isAudio = f.mimeType?.includes('audio') && !f.mimeType?.includes('video');
            const qual = isAudio
              ? `${Math.round((f.averageBitrate||f.bitrate||0)/1000)}kbps`
              : (f.qualityLabel || `${f.height}p`);
            const codec = codecLabel(f.mimeType);
            const container = containerLabel(f.mimeType);
            const size = humanSize(f.contentLength);
            const ext = container || (isAudio ? 'mp3' : 'mp4');
            const filename = isAudio ? `audio_${qual}.${ext}` : `${d.title||'video'}_${qual}.${ext}`;

            const a = document.createElement('a');
            a.className = 'fmt';
            a.href = f.url;
            a.target = '_blank';
            a.rel = 'noopener';
            a.download = filename;
            a.innerHTML = `
              <div class="fmt-left">
                <span class="fmt-badge">${qual}</span>
                <span class="fmt-codec">${codec} · ${ext.toUpperCase()}</span>
              </div>
              <div style="display:flex;align-items:center;gap:.6rem">
                ${size ? `<span class="fmt-size">${size}</span>` : ''}
                <span class="fmt-arrow">↓</span>
              </div>
            `;
            fmtList.appendChild(a);
          });
        });

        fmtsEl.style.display = 'block';
        addLog(`✓ Found formats — click one to download!`, 'ok');

      } catch(e) {
        sl.querySelector('.dot').className = 'dot d-err';
        sl.querySelector('.log-text').textContent = `Error: ${e.message}`;
        addLog('Make sure you subscribed to YTStream on RapidAPI (free plan).', 'info');
      }

      goBtn.disabled = false;
    }

    document.getElementById('url').addEventListener('keydown', e => {
      if (e.key === 'Enter') go();
    });
  </script>
</body>
</html>
